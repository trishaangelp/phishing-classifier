version: "3.9"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
